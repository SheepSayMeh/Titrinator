<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titrinator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0a0a0a;
            --surface:   #141414;
            --border:    #222;
            --accent:    #00e5ff;
            --accent-dim:#00e5ff22;
            --text:      #d0d0d0;
            --muted:     #444;
            --warn:      #ff9800;
            --danger:    #ff4444;
            --success:   #00e5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 0;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            letter-spacing: 0.15em;
            color: var(--accent);
            text-shadow: 0 0 30px #00e5ff55;
            line-height: 1;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px;
            width: 100%;
            max-width: 400px;
        }

        /* ── Scan screen ── */
        #scan-screen { display: flex; flex-direction: column; gap: 20px; }

        .scan-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scan-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }
        .scan-dot.idle { animation: none; background: var(--muted); box-shadow: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.8); }
        }

        .scan-label {
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
        }

        #device-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 48px;
        }

        .empty-hint {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-align: center;
            padding: 16px 0;
        }

        .device-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            padding: 14px 16px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.15s, background 0.15s;
            width: 100%;
        }
        .device-btn:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .device-btn:active { transform: scale(0.99); }

        .device-name { font-size: 0.95rem; }
        .device-arrow {
            color: var(--muted);
            font-size: 1rem;
            transition: color 0.15s, transform 0.15s;
        }
        .device-btn:hover .device-arrow {
            color: var(--accent);
            transform: translateX(3px);
        }

        .scan-btn {
            background: transparent;
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--accent);
            cursor: pointer;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.1em;
            padding: 12px;
            width: 100%;
            transition: background 0.15s, box-shadow 0.15s;
        }
        .scan-btn:hover {
            background: var(--accent-dim);
            box-shadow: 0 0 16px #00e5ff33;
        }

        /* ── Control screen ── */
        #control-screen {
            display: none;
            flex-direction: column;
            gap: 24px;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #connected-name {
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .conn-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--muted);
            text-transform: uppercase;
        }
        .conn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        .step-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .step-label {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .step-row {
            display: flex;
            gap: 10px;
        }

        input[type=number] {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.4rem;
            padding: 12px 16px;
            flex: 1;
            min-width: 0;
            text-align: center;
            outline: none;
            transition: border-color 0.15s;
            -moz-appearance: textfield;
        }
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input[type=number]:focus { border-color: var(--accent); }

        .step-btn {
            background: transparent;
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--accent);
            cursor: pointer;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            padding: 12px 24px;
            transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
            white-space: nowrap;
        }
        .step-btn:hover:not(:disabled) {
            background: var(--accent-dim);
            box-shadow: 0 0 16px #00e5ff33;
        }
        .step-btn:active:not(:disabled) { transform: scale(0.97); }
        .step-btn:disabled {
            border-color: var(--border);
            color: var(--muted);
            cursor: not-allowed;
        }

        /* Direction buttons */
        .dir-row {
            display: flex;
            gap: 8px;
        }
        .dir-btn {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            padding: 8px;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .dir-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        #log {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            min-height: 1.2em;
            text-align: center;
            transition: color 0.2s;
        }
        #log.ok   { color: var(--success); }
        #log.err  { color: var(--danger); }

        .disconnect-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-align: center;
            padding: 4px;
            width: 100%;
            transition: color 0.15s;
        }
        .disconnect-btn:hover { color: var(--danger); }

        /* ── No BLE warning ── */
        #no-ble {
            display: none;
            text-align: center;
            padding: 20px;
            gap: 12px;
            flex-direction: column;
        }
        .warn-icon { font-size: 2rem; }
        .warn-text { font-size: 0.8rem; color: var(--muted); line-height: 1.7; }
        .warn-text a { color: var(--accent); }

        /* ── Responsive ── */
        @media (max-width: 420px) {
            .card { padding: 20px; }
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Titrinator</h1>
        <div class="subtitle">Automatic Titration System</div>
    </div>

    <div class="card">

        <!-- No BLE support warning -->
        <div id="no-ble">
            <div class="warn-icon">⚠️</div>
            <div class="warn-text">
                Web Bluetooth is not supported in this browser.<br><br>
                Please use <strong>Chrome</strong> on Android or desktop.<br>
                On iOS, use <a href="https://apps.apple.com/app/bluefy/id1492814321" target="_blank">Bluefy</a>.
            </div>
        </div>

        <!-- Scan screen -->
        <div id="scan-screen">
            <div class="scan-header">
                <div class="scan-dot idle" id="scan-dot"></div>
                <div class="scan-label" id="scan-label">Press scan to find devices</div>
            </div>
            <div id="device-list">
                <div class="empty-hint" id="empty-hint">No devices found yet</div>
            </div>
            <button class="scan-btn" id="scan-btn">SCAN FOR DEVICES</button>
        </div>

        <!-- Control screen -->
        <div id="control-screen">
            <div class="control-header">
                <div id="connected-name">—</div>
                <div class="conn-indicator">
                    <div class="conn-dot"></div>
                    <span>connected</span>
                </div>
            </div>

            <div class="step-group">
                <div class="step-label">Steps</div>
                <div class="step-row">
                    <input type="number" id="steps" value="200" min="1" />
                    <button class="step-btn" id="step-btn">STEP</button>
                </div>
                <div class="dir-row">
                    <button class="dir-btn active" id="dir-fwd">▶ Forward</button>
                    <button class="dir-btn" id="dir-rev">◀ Reverse</button>
                </div>
            </div>

            <div id="log"></div>
            <button class="disconnect-btn" id="disconnect-btn">disconnect</button>
        </div>

    </div>

    <script>
        // ── UUIDs ──────────────────────────────────────────────────
        const SERVICE_UUID = '1aa974de-6f63-4a76-8a1f-aab707432a77';
        const CMD_UUID     = 'd3951d7f-bf1e-4ad7-9da9-04cef4d5aabb';
        const STATUS_UUID  = 'a493eaf8-8638-4375-8445-14fef39fb459';

        // ── State ──────────────────────────────────────────────────
        let device = null;
        let cmdChar = null;
        let direction = 1;  // 1 = forward, -1 = reverse

        // ── Elements ───────────────────────────────────────────────
        const scanScreen    = document.getElementById('scan-screen');
        const controlScreen = document.getElementById('control-screen');
        const noBle         = document.getElementById('no-ble');
        const scanBtn       = document.getElementById('scan-btn');
        const scanDot       = document.getElementById('scan-dot');
        const scanLabel     = document.getElementById('scan-label');
        const deviceList    = document.getElementById('device-list');
        const emptyHint     = document.getElementById('empty-hint');
        const connectedName = document.getElementById('connected-name');
        const stepBtn       = document.getElementById('step-btn');
        const stepsInput    = document.getElementById('steps');
        const logEl         = document.getElementById('log');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const dirFwd        = document.getElementById('dir-fwd');
        const dirRev        = document.getElementById('dir-rev');

        // ── Check Web Bluetooth support ────────────────────────────
        if (!navigator.bluetooth) {
            scanScreen.style.display = 'none';
            noBle.style.display = 'flex';
        }

        // ── Direction toggle ───────────────────────────────────────
        dirFwd.addEventListener('click', () => {
            direction = 1;
            dirFwd.classList.add('active');
            dirRev.classList.remove('active');
        });
        dirRev.addEventListener('click', () => {
            direction = -1;
            dirRev.classList.add('active');
            dirFwd.classList.remove('active');
        });

        // ── Scan ───────────────────────────────────────────────────
        // Web Bluetooth doesn't do background scanning — it shows the
        // browser's native device picker filtered by our service UUID.
        scanBtn.addEventListener('click', async () => {
            try {
                scanDot.classList.remove('idle');
                scanLabel.textContent = 'Waiting for selection...';
                scanBtn.disabled = true;

                device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { namePrefix: 'Titrinator-' },
                        { services: [SERVICE_UUID] }
                    ],
                    optionalServices: [SERVICE_UUID]
                });

                scanLabel.textContent = `Connecting to ${device.name}...`;

                device.addEventListener('gattserverdisconnected', onDisconnected);

                const server  = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                cmdChar        = await service.getCharacteristic(CMD_UUID);

                const statusChar = await service.getCharacteristic(STATUS_UUID);
                await statusChar.startNotifications();
                statusChar.addEventListener('characteristicvaluechanged', onNotify);

                // Connected — switch screens
                connectedName.textContent = device.name;
                scanScreen.style.display    = 'none';
                controlScreen.style.display = 'flex';

            } catch (err) {
                console.error(err);
                scanDot.classList.add('idle');
                if (err.name === 'NotFoundError') {
                    scanLabel.textContent = 'No device selected.';
                } else {
                    scanLabel.textContent = `Error: ${err.message}`;
                }
                scanBtn.disabled = false;
            }
        });

        // ── Notifications from ESP32 ───────────────────────────────
        function onNotify(event) {
            const msg = new TextDecoder().decode(event.target.value);
            setLog(msg, msg.startsWith('ERR') ? 'err' : 'ok');
            stepBtn.disabled = false;
        }

        // ── Disconnect ─────────────────────────────────────────────
        function onDisconnected() {
            cmdChar = null;
            controlScreen.style.display = 'none';
            scanScreen.style.display    = 'flex';
            scanDot.classList.add('idle');
            scanLabel.textContent = 'Disconnected. Press scan to reconnect.';
            scanBtn.disabled = false;
        }

        disconnectBtn.addEventListener('click', () => {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            } else {
                onDisconnected();
            }
        });

        // ── Send step command ──────────────────────────────────────
        stepBtn.addEventListener('click', async () => {
            if (!cmdChar) return;
            const steps = parseInt(stepsInput.value);
            if (isNaN(steps) || steps <= 0) {
                setLog('ERR invalid step count', 'err');
                return;
            }
            const actual = steps * direction;
            stepBtn.disabled = true;
            setLog(`Sending STEP ${actual}...`, '');
            try {
                const cmd = new TextEncoder().encode(`STEP ${actual}`);
                await cmdChar.writeValueWithoutResponse(cmd);
            } catch (err) {
                setLog(`ERR ${err.message}`, 'err');
                stepBtn.disabled = false;
            }
        });

        // ── Log helper ─────────────────────────────────────────────
        function setLog(msg, type) {
            logEl.textContent = msg;
            logEl.className = type;
        }
    </script>
</body>
</html>
```
